mode: ha

node:
  id: node-a

ha:
  bind: 0.0.0.0:9375
  interface: eth0
  group_id: cluster-ha
  addresses:
    - 172.31.21.10/24
    - fd00::10/64
  peer: 172.31.21.12:9375
  protocol_version: 1
  priority: 110
  preempt: true
  advert_interval_ms: 1000
  dead_factor: 3
  hold_down_ms: 3000
  jitter_ms: 100
  auth:
    mode: shared_key
    key: change-me

kv: {}
