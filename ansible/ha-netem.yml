---
- name: Apply or clear tc netem impairment on gruezi HA traffic
  hosts: '{{ gruezi_netem_hosts | default("gruezi_ha_lab") }}'
  gather_facts: false
  become: true
  vars:
    gruezi_netem_state: present
    gruezi_netem_args: delay 250ms 50ms
    gruezi_ha_peer_port: 9375
  pre_tasks:
    - name: Validate netem state
      ansible.builtin.assert:
        that:
          - gruezi_netem_state in ['present', 'absent']
        fail_msg: gruezi_netem_state must be 'present' or 'absent'

    - name: Validate netem arguments when applying impairment
      ansible.builtin.assert:
        that:
          - gruezi_netem_args | trim | length > 0
        fail_msg: gruezi_netem_args cannot be empty when gruezi_netem_state is present
      when: gruezi_netem_state == 'present'

    - name: Validate HA interface variable
      ansible.builtin.assert:
        that:
          - gruezi_interface is defined
          - gruezi_interface | trim | length > 0
        fail_msg: gruezi_interface must be defined in the HA lab inventory or group vars

    - name: Validate peer IP variable
      ansible.builtin.assert:
        that:
          - gruezi_peer_ip is defined
          - gruezi_peer_ip | trim | length > 0
        fail_msg: gruezi_peer_ip must be defined for each HA lab host

  tasks:
    - name: Apply tc netem impairment to HA UDP traffic only
      ansible.builtin.shell: |
        set -euo pipefail
        tc qdisc replace dev {{ gruezi_interface }} root handle 1: prio
        tc qdisc replace dev {{ gruezi_interface }} parent 1:3 handle 30: netem {{ gruezi_netem_args }}
        tc filter replace dev {{ gruezi_interface }} protocol ip parent 1: prio 3 u32 \
          match ip dst {{ gruezi_peer_ip }}/32 \
          match ip protocol 17 0xff \
          match ip dport {{ gruezi_ha_peer_port }} 0xffff \
          flowid 1:3
      args:
        executable: /bin/bash
      when: gruezi_netem_state == 'present'
      changed_when: true

    - name: Clear tc netem impairment from the HA interface
      ansible.builtin.command:
        argv:
          - tc
          - qdisc
          - del
          - dev
          - '{{ gruezi_interface }}'
          - root
      register: gruezi_netem_clear
      failed_when: false
      changed_when: gruezi_netem_clear.rc == 0
      when: gruezi_netem_state == 'absent'

    - name: Show current qdisc state
      ansible.builtin.command:
        argv:
          - tc
          - qdisc
          - show
          - dev
          - '{{ gruezi_interface }}'
      register: gruezi_netem_show
      changed_when: false

    - name: Show current tc filters
      ansible.builtin.command:
        argv:
          - tc
          - filter
          - show
          - dev
          - '{{ gruezi_interface }}'
      register: gruezi_netem_filter_show
      changed_when: false

    - name: Display current qdisc state
      ansible.builtin.debug:
        msg: '{{ inventory_hostname }} qdisc -> {{ gruezi_netem_show.stdout }}'

    - name: Display current filter state
      ansible.builtin.debug:
        msg: '{{ inventory_hostname }} filter -> {{ gruezi_netem_filter_show.stdout }}'
